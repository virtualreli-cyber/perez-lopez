<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nuestro Espacio - Panel de Control Modular</title>
  
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#F4EFE6', // Beige crema mate y suave
            surface: '#FCFBF9', // Blanco lino ultra-suave para tarjetas
            primary: '#3E5219', // Verde Olivo profundo para elementos clave
            'primary-light': '#556B2F', // Verde Olivo desaturado
            'primary-dark': '#2E3D12',
            accent: '#4A8B8B', // Turquesa/Azul verdoso sutil y apagado
            'accent-light': '#E0F2F1', // Turquesa desaturado claro
            wine: '#7A3542', // Vino profundo y elegante para buen contraste
            terracotta: '#C07D53', // Terracota cálido
            charcoal: '#2D3436', // Carbón para texto de alta legibilidad
            outline: '#75796B',
            'outline-variant': '#C5C8B8',
            error: '#BA1A1A',
            'error-container': '#FFDAD6',
            'on-error-container': '#93000A',
          },
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
          },
          boxShadow: {
            'linen': '0 4px 24px -2px rgba(62, 82, 25, 0.04), 0 2px 10px -1px rgba(62, 82, 25, 0.02)',
            'linen-hover': '0 10px 30px -4px rgba(62, 82, 25, 0.08), 0 4px 14px -2px rgba(62, 82, 25, 0.04)',
          },
          borderRadius: {
            '2xl': '1.5rem',
            'xl': '1rem',
          }
        }
      }
    }
  </script>

  <style>
    .view-transition {
      transition: opacity 0.25s ease-in-out, transform 0.25s ease-in-out;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: #C5C8B8;
      border-radius: 20px;
    }
    .checkbox-bounce:checked + div svg {
      transform: scale(1);
      opacity: 1;
    }
  </style>
</head>

<body class="bg-background text-charcoal h-full font-sans antialiased overflow-hidden">
  
  <!-- Punto de Entrada del Router Modular -->
  <script type="module" src="./src/pages/index.js"></script>

</body>
</html>
